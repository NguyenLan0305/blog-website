<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đang tải bài viết... | Inkwell</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" type="text/css" href="../assets/css/main.css"/>

  <style>
    :root {
      --surface:               #0b0e14;
      --on-surface:            #e0e5f5;
      --on-surface-variant:    #a5abba;
      --outline-variant:       #424855;
      --primary:               #ac8aff;
    }

    /* CSS cho Sidebar Comment */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* Đường kẻ dọc cho Reply lồng nhau */
    .comment-thread { position: relative; }
    .comment-thread::before {
      content: ''; position: absolute;
      left: 15px; top: 40px; bottom: -10px; /* Căn lề theo avatar */
      width: 2px; background-color: #2D333B;
      border-radius: 2px;
    }

    /* Chỉnh sửa riêng cho avatar trong danh sách comment */
    .comment-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(172,138,255,0.2); flex-shrink: 0; }

    body { background-color: var(--surface); color: var(--on-surface); font-family: 'Inter', sans-serif; }
    a { text-decoration: none !important; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

    /* CSS tuỳ chỉnh cho bài viết */
    .article-container { max-width: 760px; margin: 0 auto; }
    .article-banner { width: 100%; aspect-ratio: 21/9; object-fit: cover; margin-bottom: 2.5rem; background-color: #151a22; border-radius: 12px;}

    .article-title { font-family: 'Newsreader', serif; font-size: 2.75rem; font-weight: 700; color: var(--on-surface); margin-bottom: 1.5rem; line-height: 1.2; letter-spacing: -0.02em; }

    /* Author Row */
    .author-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(172,138,255,0.2); }
    .author-name { color: var(--on-surface); font-weight: 600; font-size: 0.95rem; }
    .author-name:hover { color: var(--primary); }
    .author-handle { color: var(--on-surface-variant); font-size: 0.85rem; }

    /* Action Bar (Like, Comment, Share) */
    .action-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 0; margin: 2rem 0 2.5rem; border-top: 1px solid rgba(66,72,85,0.2); border-bottom: 1px solid rgba(66,72,85,0.2); }
    .action-btn { display: flex; align-items: center; gap: 0.4rem; color: var(--on-surface-variant); cursor: pointer; transition: color 0.2s; font-size: 0.9rem; }
    .action-btn:hover { color: var(--on-surface); }
    .action-btn.like:hover { color: #ff4757; }

    /* Article Content */
    .article-content { font-family: 'Newsreader', serif; font-size: 1.25rem; line-height: 1.8; color: #d1d5db; }
    .article-content p { margin-bottom: 1.8rem; }
    .article-content h2 { font-family: 'Newsreader', serif; font-size: 2rem; font-weight: 700; color: var(--on-surface); margin: 2.5rem 0 1rem; }
    .article-content h3 { font-family: 'Inter', sans-serif; font-size: 1.4rem; font-weight: 600; color: var(--on-surface); margin: 2rem 0 1rem; }
    .article-content img { max-width: 100%; border-radius: 8px; margin: 2rem 0; display: block; }
    .article-content blockquote { border-left: 3px solid var(--primary); padding-left: 1.5rem; font-style: italic; color: var(--on-surface-variant); margin: 2rem 0; font-size: 1.35rem; }
    .article-content pre { background: #151a22; padding: 1.5rem; border-radius: 8px; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; border: 1px solid rgba(66,72,85,0.15); margin-bottom: 2rem; }
    .article-content ul, .article-content ol { margin-bottom: 2rem; padding-left: 1.5rem; }
    .article-content li { margin-bottom: 0.5rem; }
    .article-content hr { border-color: rgba(66,72,85,0.3); margin: 3rem 0; }

    .tag-pill { background: rgba(255,255,255,0.05); padding: 0.3rem 0.8rem; border-radius: 9999px; color: var(--on-surface); font-size: 0.85rem; transition: background 0.2s; display: inline-block; }
    .tag-pill:hover { background: rgba(255,255,255,0.1); }

    /* Class dùng cho trạng thái Like / Unlike để tránh lỗi parse CSS inline */
    .heart-filled { font-variation-settings: 'FILL' 1; color: #ff4757 !important; }
    .heart-outline { font-variation-settings: 'FILL' 0; color: var(--on-surface-variant) !important; }

  </style>
</head>
<body class="overflow-x-hidden bg-background no-global-search">

<div id="navbar-container"></div>

<main class="container-xl" style="padding-top: 100px; padding-bottom: 100px;">
  <div class="row justify-content-center">
    <div class="col-12" id="article-wrapper">
      <div class="text-center py-5">
        <span class="material-symbols-outlined" style="animation: spin 1s linear infinite; font-size: 3rem; color: var(--primary);">sync</span>
        <p class="mt-3" style="color: var(--on-surface-variant);">Đang tải bài viết...</p>
      </div>
    </div>
  </div>
</main>

<div id="footer-container"></div>
<div id="toasts"></div>

<div id="comment-overlay" class="fixed inset-0 bg-[#0D1117]/60 backdrop-blur-sm z-[9998] hidden opacity-0 transition-opacity duration-300" onclick="closeCommentSidebar()"></div>

<div id="comment-sidebar" class="fixed top-0 right-0 w-full md:w-[400px] h-full bg-[#151a22] border-l border-[#2D333B] shadow-2xl z-[9999] transform translate-x-full transition-transform duration-300 flex flex-col">
  <div class="p-6 border-b border-[#2D333B] flex-shrink-0 flex justify-between items-start bg-[#151a22]">
    <div>
      <h2 class="text-xl font-bold text-[#e0e5f5] mb-1">Comment (<span id="sidebar-comment-count">0</span>)</h2>
      <p id="sidebar-blog-title" class="text-sm text-[#a5abba] line-clamp-1">Tên bài viết...</p>
    </div>
    <button onclick="closeCommentSidebar()" class="text-[#a5abba] hover:text-[#e0e5f5] transition-colors bg-transparent border-none p-1">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto p-6 scrollbar-hide bg-[#151a22]">
    <div class="mb-8 bg-[#1C2128] rounded-xl p-4 border border-[#2D333B] focus-within:border-[#ac8aff]/50 transition-colors shadow-inner">
      <div class="flex items-center gap-3 mb-3">
        <div id="current-user-avatar" class="w-8 h-8 rounded-full bg-[#2D333B] flex items-center justify-center text-xs font-bold text-[#e0e5f5]">?</div>
        <span id="current-user-name" class="text-sm font-semibold text-[#e0e5f5]">@guest</span>
      </div>
      <textarea id="main-comment-input" rows="3" class="w-full bg-transparent border-none outline-none text-[#e0e5f5] text-sm resize-none placeholder-[#a5abba]/50" placeholder="What are your thoughts?"></textarea>
      <div class="flex justify-end mt-2">
        <button id="btn-submit-main-comment" onclick="submitComment(null)" class="px-5 py-2 bg-[#e0e5f5] text-[#0D1117] rounded-full text-xs font-bold hover:bg-white transition-colors disabled:opacity-50">Comment</button>
      </div>
    </div>

    <div id="comments-list" class="space-y-6 pb-20">
      <div class="text-center py-10 text-[#a5abba] text-sm">Đang tải bình luận...</div>
    </div>
  </div>
</div>

<div id="confirm-delete-modal" class="fixed inset-0 bg-[#0b0e14]/80 backdrop-blur-sm z-[10000] hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
  <div class="bg-[#151a22] border border-[#424855]/30 rounded-xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300 shadow-2xl">
    <div class="flex items-center gap-3 mb-4">
      <div class="bg-red-500/10 text-red-500 p-2 rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined">warning</span>
      </div>
      <h3 class="text-lg font-bold text-[#e0e5f5] font-['Inter']">Xóa bình luận?</h3>
    </div>
    <p class="text-[#a5abba] text-sm mb-6 leading-relaxed">Xóa bình luận này sẽ xóa luôn các câu trả lời bên trong. Hành động này không thể hoàn tác.</p>
    <div class="flex justify-end gap-3">
      <button onclick="closeConfirmModal()" class="px-5 py-2.5 rounded-lg text-sm font-medium text-[#a5abba] hover:text-[#e0e5f5] hover:bg-[#1b202a] transition-all">Hủy</button>
      <button id="btn-confirm-delete" class="px-5 py-2.5 rounded-lg text-sm font-bold bg-red-500 text-white hover:bg-red-600 transition-all flex items-center gap-2">Xóa</button>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/app.js"></script>
<script src="../assets/js/nav.js"></script>

<script>
  let blogId = null;
  let globalBlogAuthor = '';
  let commentIdToDelete = null; // Biến tạm lưu ID bình luận cần xóa

  $(document).ready(function() {
    $('#navbar-container').load('../fragments/navbar.html', function() {
      if (typeof updateNavAuth === 'function') updateNavAuth();
    });
    $('#footer-container').load('../fragments/footer.html');

    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('id');

    if (!slug) {
      $('#article-wrapper').html('<div class="alert alert-danger text-center">Không tìm thấy mã bài viết!</div>');
      return;
    }

    blogId = extractIdFromSlug(slug);

    callApi('/blogs/' + blogId, 'GET').done(function(res) {
      const post = res.result || res;
      renderArticle(post);
      if (urlParams.get('openComments') === 'true') {
        setTimeout(() => {
          openCommentSidebar();
        }, 500); // Trì hoãn xíu để DOM render xong bài viết
      }
    }).fail(function() {
      $('#article-wrapper').html(`
        <div class="text-center py-5">
            <span class="material-symbols-outlined text-danger" style="font-size: 4rem;">error</span>
            <h3 class="mt-3 text-light">Bài viết không tồn tại</h3>
            <p style="color: var(--on-surface-variant);">Có thể bài viết đã bị xóa hoặc đường dẫn không hợp lệ.</p>
            <a href="home-page.html" class="btn mt-3" style="background: var(--primary); color: #000; border-radius: 99px; padding: 0.5rem 1.5rem; font-weight: 600;">Về trang chủ</a>
        </div>
      `);
    });

    // Bắt sự kiện bấm nút "Xóa" trong Modal
    $('#btn-confirm-delete').on('click', function() {
      if (!commentIdToDelete) return;

      const btn = $(this);
      const originalText = btn.text();
      btn.html('<span class="material-symbols-outlined text-[1rem]" style="animation: spin 1s linear infinite;">sync</span> Đang xóa...').prop('disabled', true);

      callApi('/blogs/comments/' + commentIdToDelete, 'DELETE').done(function() {
        loadComments();
        toast("Đã xóa bình luận.");
        closeConfirmModal();
      }).fail(function() {
        toast("Lỗi không thể xóa bình luận.");
      }).always(function() {
        btn.html(originalText).prop('disabled', false);
      });
    });
  });

  function renderArticle(post) {
    document.title = post.title + " | Inkwell";

    const authorUsername = post.author ? post.author.username : 'Anonymous';
    const authorName = post.author && post.author.fullName ? post.author.fullName : authorUsername;
    const authorAvatar = (post.author && post.author.avatarUrl) ? post.author.avatarUrl : `https://ui-avatars.com/api/?name=${authorUsername}&background=151a22&color=ac8aff`;
    const dateStr = fmtDate(post.createdAt);

    globalBlogAuthor = authorUsername;
    $('#sidebar-blog-title').text(post.title);

    let bannerHtml = '';
    if (post.banner) bannerHtml = `<img src="${post.banner}" alt="Banner" class="article-banner">`;

    let tagsHtml = '';
    if (post.tags && post.tags.length > 0) {
      post.tags.forEach(t => { tagsHtml += `<a href="#" class="tag-pill me-2 mb-2">${t.name}</a>`; });
    }

    let contentHtml = '';
    try {
      const data = JSON.parse(post.content);
      if (data && data.blocks) {
        data.blocks.forEach(b => {
          switch(b.type) {
            case 'paragraph': contentHtml += `<p>${b.data.text}</p>`; break;
            case 'h1': contentHtml += `<h2>${b.data.text}</h2>`; break;
            case 'h2': case 'h3': contentHtml += `<h3>${b.data.text}</h3>`; break;
            case 'image': contentHtml += `<figure><img src="${b.data.url}" alt="image">${b.data.caption ? `<figcaption class="text-center text-muted mt-2" style="font-size: 0.85rem; font-style: italic;">${b.data.caption}</figcaption>` : ''}</figure>`; break;
            case 'quote': contentHtml += `<blockquote>${b.data.text}</blockquote>`; break;
            case 'code': contentHtml += `<pre><code>${b.data.text}</code></pre>`; break;
            case 'bullet': contentHtml += `<ul><li>${b.data.text}</li></ul>`; break;
            case 'numbered': contentHtml += `<ol><li>${b.data.text}</li></ol>`; break;
            case 'divider': contentHtml += `<hr>`; break;
          }
        });
      }
    } catch (e) {
      contentHtml = `<p>${post.content}</p>`;
    }

    $('#article-wrapper').html(`
        <div class="article-container">
            ${bannerHtml}
            <h1 class="article-title">${post.title}</h1>
            <div class="d-flex align-items-center justify-content-between mb-2">
                <div class="d-flex align-items-center gap-3">
                    <a href="user-profile.html?user=${authorUsername}">
                        <img src="${authorAvatar}" alt="${authorUsername}" class="author-avatar">
                    </a>
                    <div class="d-flex flex-column">
                        <a href="user-profile.html?user=${authorUsername}" class="author-name">${authorName}</a>
                        <a href="user-profile.html?user=${authorUsername}" class="author-handle">@${authorUsername}</a>
                    </div>
                </div>
                <div style="color: var(--on-surface-variant); font-size: 0.85rem;">Published on ${dateStr}</div>
            </div>

            <div class="action-bar">
                <div class="d-flex gap-4">
                    <div id="like-btn-action" class="action-btn like" data-liked="${post.likedByCurrentUser}" onclick="toggleLike()">
                        <span class="material-symbols-outlined ${post.likedByCurrentUser ? 'heart-filled' : 'heart-outline'}">favorite</span>
                        <span id="like-count-display">${post.totalLikes || 0}</span>
                    </div>
                    <div class="action-btn" onclick="openCommentSidebar()">
                        <span class="material-symbols-outlined">chat_bubble</span>
                        <span id="comment-count-display">${post.totalComments || 0}</span>
                    </div>
                </div>
                <div class="d-flex gap-3">
                    <div id="bookmark-btn-action" class="action-btn" data-bookmarked="${post.bookmarkedByCurrentUser}" onclick="toggleBookmark()">
                        <span class="material-symbols-outlined ${post.bookmarkedByCurrentUser ? 'heart-filled' : 'heart-outline'}">bookmark</span>
                    </div>
                    <div class="action-btn" onclick="navigator.clipboard.writeText(window.location.href); toast('Đã copy link bài viết!');">
                        <span class="material-symbols-outlined">share</span>
                    </div>
                </div>
            </div>

            <div class="article-content">${contentHtml}</div>

            <div class="mt-5 pt-4 border-top" style="border-color: rgba(66,72,85,0.2) !important;">
                <div class="mb-3" style="color: var(--on-surface-variant); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em;">Tags</div>
                <div class="d-flex flex-wrap">${tagsHtml}</div>
            </div>
        </div>
    `);
  }

  function fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return d.getDate() + ' ' + m[d.getMonth()] + ' ' + d.getFullYear();
  }

  // ==========================================
  // THAO TÁC LIKE / BOOKMARK
  // ==========================================
  function toggleLike() {
    if (!S.isAuth) { toast("Vui lòng đăng nhập để thả tim bài viết!"); return; }

    const $btn = $('#like-btn-action');
    const $icon = $btn.find('.material-symbols-outlined');
    const $count = $('#like-count-display');
    let currentLikes = parseInt($count.text());
    let isLiked = $btn.data('liked');

    if (isLiked) {
      $icon.removeClass('heart-filled').addClass('heart-outline');
      $count.text(currentLikes - 1);
      $btn.data('liked', false);
    } else {
      $icon.removeClass('heart-outline').addClass('heart-filled');
      $count.text(currentLikes + 1);
      $btn.data('liked', true);
    }

    callApi('/blogs/' + blogId + '/like', 'POST').fail(function() {
      toast("Lỗi đồng bộ lượt thích!");
    });
  }

  function toggleBookmark() {
    if (!S.isAuth) { toast("Vui lòng đăng nhập để lưu bài viết!"); return; }

    const $btn = $('#bookmark-btn-action');
    const $icon = $btn.find('.material-symbols-outlined');
    let isBookmarked = $btn.data('bookmarked');

    if (isBookmarked) {
      $icon.removeClass('heart-filled').addClass('heart-outline');
      $btn.data('bookmarked', false);
      toast("Đã bỏ lưu bài viết");
    } else {
      $icon.removeClass('heart-outline').addClass('heart-filled');
      $btn.data('bookmarked', true);
      toast("Đã lưu bài viết vào danh sách đọc");
    }

    callApi('/blogs/' + blogId + '/bookmark', 'POST').fail(function() {
      toast("Lỗi! Không thể lưu bài viết.");
    });
  }

  // ==========================================
  // LOGIC SIDEBAR BÌNH LUẬN & MODAL XÓA
  // ==========================================
  function openCommentSidebar() {
    $('#comment-overlay').removeClass('hidden').addClass('opacity-100');
    $('#comment-sidebar').removeClass('translate-x-full').addClass('translate-x-0');

    if (S.isAuth) {
      $('#current-user-name').text('@' + S.uname);
      $('#current-user-avatar').text(typeof initials === 'function' ? initials(S.uname) : S.uname.charAt(0).toUpperCase());
    } else {
      $('#main-comment-input').attr('placeholder', 'Vui lòng đăng nhập để bình luận...').prop('disabled', true);
      $('#btn-submit-main-comment').hide();
    }
    loadComments();
  }

  function closeCommentSidebar() {
    $('#comment-sidebar').removeClass('translate-x-0').addClass('translate-x-full');
    $('#comment-overlay').removeClass('opacity-100');
    setTimeout(() => $('#comment-overlay').addClass('hidden'), 300);
  }

  function loadComments() {
    callApi('/blogs/' + blogId + '/comments', 'GET').done(function(res) {
      const comments = res.result || [];
      let totalCount = 0;
      function countReplies(arr) {
        totalCount += arr.length;
        arr.forEach(c => { if(c.replies) countReplies(c.replies); });
      }
      countReplies(comments);

      $('#sidebar-comment-count').text(totalCount);
      $('#comment-count-display').text(totalCount);

      const $list = $('#comments-list');
      $list.empty();

      if (comments.length === 0) {
        $list.html('<div class="text-center py-10 text-[#a5abba] text-sm">Chưa có bình luận nào. Hãy là người đầu tiên!</div>');
        return;
      }
      comments.forEach(c => { $list.append(buildCommentHTML(c, 0)); });
    });
  }

  function buildCommentHTML(comment, depth) {
    const marginLeft = depth > 0 ? (depth > 2 ? 2 : depth) * 2.5 : 0;
    const isAuthor = S.isAuth && S.uname === comment.user.username;
    const isBlogOwner = S.isAuth && S.uname === globalBlogAuthor;
    const canDelete = isAuthor || isBlogOwner;

    const avatarUrl = comment.user.avatarUrl || `https://ui-avatars.com/api/?name=${comment.user.username}&background=151a22&color=ac8aff`;
    const dateStr = fmtDate(comment.createdAt);

    let html = `
            <div class="${depth === 0 && comment.replies && comment.replies.length > 0 ? 'comment-thread' : ''} mb-5" style="margin-left: ${marginLeft}rem;" id="comment-${comment.id}">
                <div class="flex items-start gap-3">
                    <img src="${avatarUrl}" alt="avatar" class="comment-avatar">
                    <div class="flex-1">
                        <div class="bg-[#1C2128] rounded-xl rounded-tl-none p-3 border border-[#2D333B]">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-sm font-semibold text-[#e0e5f5]">@${comment.user.username}</span>
                                <span class="text-xs text-[#a5abba]">${dateStr}</span>
                            </div>
                            <p class="text-sm text-[#d1d5db] leading-relaxed whitespace-pre-wrap">${comment.content}</p>
                        </div>

                        <div class="flex items-center gap-4 mt-2 ml-1">
                            <button onclick="toggleReplyForm('${comment.id}')" class="text-xs font-medium text-[#a5abba] hover:text-[#e0e5f5] transition-colors flex items-center gap-1">
                                <span class="material-symbols-outlined" style="font-size: 14px;">reply</span> Reply
                            </button>
                            ${canDelete ? `
                            <button onclick="openConfirmModal('${comment.id}')" class="text-xs font-medium text-red-500/70 hover:text-red-500 transition-colors flex items-center gap-1">
                                <span class="material-symbols-outlined" style="font-size: 14px;">delete</span> Delete
                            </button>` : ''}
                        </div>

                        <div id="reply-form-${comment.id}" class="hidden mt-3 bg-[#1C2128] rounded-xl p-3 border border-[#2D333B] focus-within:border-[#ac8aff]/50 transition-colors">
                            <textarea id="reply-input-${comment.id}" rows="2" class="w-full bg-transparent border-none outline-none text-[#e0e5f5] text-sm resize-none" placeholder="Replying to @${comment.user.username}..."></textarea>
                            <div class="flex justify-end gap-2 mt-2">
                                <button onclick="toggleReplyForm('${comment.id}')" class="px-3 py-1 text-xs text-[#a5abba] hover:text-[#e0e5f5]">Cancel</button>
                                <button onclick="submitComment('${comment.id}')" class="px-4 py-1 bg-[#ac8aff] text-[#0D1117] rounded-full text-xs font-bold hover:opacity-90">Reply</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;

    if (comment.replies && comment.replies.length > 0) {
      let repliesHtml = '<div class="replies-container">';
      comment.replies.forEach(r => { repliesHtml += buildCommentHTML(r, depth + 1); });
      repliesHtml += '</div>';
      html += repliesHtml;
    }
    return html;
  }

  function toggleReplyForm(commentId) {
    if (!S.isAuth) { toast("Vui lòng đăng nhập để trả lời bình luận!"); return; }
    const $form = $(`#reply-form-${commentId}`);
    $form.toggleClass('hidden');
    if (!$form.hasClass('hidden')) $(`#reply-input-${commentId}`).focus();
  }

  function submitComment(parentId) {
    const inputId = parentId ? `#reply-input-${parentId}` : '#main-comment-input';
    const $input = $(inputId);
    const content = $input.val().trim();

    if (!content) return;

    const payload = { content: content, parentId: parentId };

    callApi('/blogs/' + blogId + '/comments', 'POST', payload).done(function() {
      $input.val('');
      if (parentId) toggleReplyForm(parentId);
      loadComments();
    }).fail(function(xhr) {
      toast("Lỗi khi gửi bình luận: " + (xhr.responseJSON?.message || ""));
    });
  }

  // --- LOGIC ĐÓNG MỞ MODAL XÁC NHẬN XÓA BÌNH LUẬN ---
  function openConfirmModal(commentId) {
    commentIdToDelete = commentId;
    const $modal = $('#confirm-delete-modal');
    $modal.removeClass('hidden').addClass('flex');

    setTimeout(() => {
      $modal.removeClass('opacity-0').addClass('opacity-100');
      $modal.find('div').first().removeClass('scale-95').addClass('scale-100');
    }, 10);
  }

  function closeConfirmModal() {
    const $modal = $('#confirm-delete-modal');
    $modal.removeClass('opacity-100').addClass('opacity-0');
    $modal.find('div').first().removeClass('scale-100').addClass('scale-95');

    setTimeout(() => {
      $modal.removeClass('flex').addClass('hidden');
      commentIdToDelete = null;
    }, 300);
  }
</script>
</body>
</html>
