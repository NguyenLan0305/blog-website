<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Notifications — Inkwell</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../assets/css/main.css"/>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
        body { background-color: #0b0e14 !important; color: #e0e5f5; font-family: 'Inter', sans-serif; margin: 0; }
        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; }
        #navbar-container { position: fixed; top: 0; width: 100%; z-index: 1050; background: #0b0e14; border-bottom: 1px solid rgba(66,72,85,0.15);}
        .no-underline { text-decoration: none !important; }

        /* Animation cho list thông báo */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .notif-animate { animation: slideIn 0.3s ease forwards; }
    </style>
</head>
<body class="overflow-x-hidden bg-background no-global-search">

<div id="navbar-container"></div>

<div class="flex flex-col min-h-screen" style="padding-top: 100px;">
    <main class="flex-1 p-6 md:p-10 max-w-3xl mx-auto w-full">
        <header class="mb-10 border-b border-[#424855]/20 pb-6">
            <h2 class="font-['Newsreader'] text-4xl font-bold text-[#e0e5f5] mb-2 italic tracking-tight">Notifications</h2>
            <p class="text-[#a5abba] text-sm">Cập nhật những tương tác mới nhất từ cộng đồng của bạn.</p>
        </header>

        <div id="notif-list" class="space-y-4 pb-20">
            <div class="text-center py-10 text-[#a5abba] flex flex-col items-center gap-3">
                <span class="material-symbols-outlined" style="animation: spin 1s linear infinite; font-size: 2rem; color: var(--primary);">sync</span>
                <span>Đang tải thông báo...</span>
            </div>
        </div>
    </main>
</div>

<div id="toasts"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/nav.js"></script>

<script>
    $(document).ready(function() {
        $('#navbar-container').load('../fragments/navbar.html', function() {
            if (typeof updateNavAuth === 'function') { updateNavAuth(); }
        });

        // Đã xóa hàm gọi load dashboard-sidebar ở đây

        if (!S.isAuth) { window.location.href = 'login.html'; }
        else { loadNotifications(); }
    });

    function loadNotifications() {
        const $list = $('#notif-list');
        callApi('/notifications', 'GET').done(function(res) {
            const notifs = res.result || [];
            $list.empty();

            if(notifs.length === 0) {
                $list.html(`
                    <div class="flex flex-col items-center justify-center py-20 px-4 bg-[#151a22]/40 rounded-3xl border border-[#424855]/20 backdrop-blur-sm">
                        <div class="w-20 h-20 bg-[#1b202a] rounded-full flex items-center justify-center mb-6 shadow-inner border border-[#424855]/30">
                            <span class="material-symbols-outlined text-5xl text-[#a5abba]/50" style="font-variation-settings: 'FILL' 0;">notifications_off</span>
                        </div>
                        <h3 class="text-xl font-['Newsreader'] font-bold text-[#e0e5f5] mb-2">Chưa có thông báo nào</h3>
                        <p class="text-sm text-[#a5abba] max-w-sm text-center leading-relaxed">Khi ai đó tương tác với bài viết của bạn hoặc theo dõi bạn, thông báo sẽ xuất hiện tại đây.</p>
                    </div>
                `);
                return;
            }

            notifs.forEach((n, index) => {
                let icon = ''; let colorClass = ''; let bgClass = '';

                // Phân loại Icon và Màu sắc
                if(n.type === 'LIKE') {
                    icon = 'favorite'; colorClass = 'text-[#ac8aff]'; bgClass = 'bg-[#ac8aff]/10 border border-[#ac8aff]/20';
                } else if(n.type === 'COMMENT' || n.type === 'REPLY') {
                    icon = 'chat_bubble'; colorClass = 'text-[#89ceff]'; bgClass = 'bg-[#89ceff]/10 border border-[#89ceff]/20';
                } else if(n.type === 'FOLLOW') {
                    icon = 'person_add'; colorClass = 'text-[#c9f791]'; bgClass = 'bg-[#c9f791]/10 border border-[#c9f791]/20';
                }

                // Format lại nội dung: In đậm @username
                let formattedMessage = n.message.replace(/@(\w+)/g, '<span class="font-bold text-white tracking-wide">@$1</span>');

                // Style dựa trên trạng thái (Đã đọc / Chưa đọc)
                const unreadBar = !n.read ? `<div class="absolute left-0 top-1/2 -translate-y-1/2 w-[3px] h-10 bg-[#ac8aff] rounded-r-full shadow-[0_0_10px_rgba(172,138,255,0.8)]"></div>` : '';
                const cardBaseStyle = !n.read
                    ? 'bg-gradient-to-r from-[#151a22] to-[#151a22] hover:to-[#1b202a] border-[#ac8aff]/30 shadow-[0_4px_20px_rgba(0,0,0,0.2)]'
                    : 'bg-[#0b0e14] border-[#424855]/20 opacity-80 hover:opacity-100 hover:bg-[#151a22]';

                const dateStr = fmtDate(n.createdAt);

                // Độ trễ animation cho từng item để tạo hiệu ứng rớt xuống lần lượt
                const animDelay = index * 0.05;

                $list.append(`
                    <div id="notif-${n.id}"
                         class="group relative notif-animate rounded-2xl p-5 md:p-6 flex gap-4 md:gap-5 items-start cursor-pointer transition-all duration-300 border ${cardBaseStyle}"
                         style="animation-delay: ${animDelay}s; opacity: 0;"
                         onclick="openNotif('${n.id}', '${n.targetUrl}')">

                        ${unreadBar}

                        <div class="${bgClass} w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 shadow-inner">
                            <span class="material-symbols-outlined ${colorClass} text-[1.3rem]" style="font-variation-settings: 'FILL' 1;">${icon}</span>
                        </div>

                        <div class="flex-1 pr-10">
                            <p class="text-[0.95rem] text-[#e0e5f5] leading-relaxed">${formattedMessage}</p>
                            <div class="flex items-center gap-1.5 mt-2.5 text-[#a5abba] text-[0.7rem] font-medium uppercase tracking-[0.05em]">
                                <span class="material-symbols-outlined text-[14px]">schedule</span>
                                ${dateStr}
                            </div>
                        </div>

                        <button onclick="deleteNotif('${n.id}', event)"
                                class="absolute top-1/2 -translate-y-1/2 right-4 md:right-6 w-9 h-9 flex items-center justify-center rounded-full text-[#a5abba] opacity-0 group-hover:opacity-100 hover:bg-red-500/10 hover:text-red-500 transition-all duration-200"
                                title="Xóa thông báo">
                            <span class="material-symbols-outlined text-[1.2rem]">delete</span>
                        </button>
                    </div>
                `);
            });
        }).fail(function() {
            $list.html('<p class="text-center text-red-400 mt-5">Lỗi kết nối! Không thể tải thông báo.</p>');
        });
    }

    function openNotif(id, url) {
        // Đánh dấu đã đọc ngầm dưới nền, gọi xong thì chuyển hướng URL
        callApi('/notifications/' + id + '/read', 'PUT').always(function() {
            window.location.href = url;
        });
    }

    function deleteNotif(id, event) {
        event.stopPropagation(); // Ngăn chặn click lan ra thẻ cha
        callApi('/notifications/' + id, 'DELETE').done(function() {
            $(`#notif-${id}`).slideUp(300, function() { $(this).remove(); });
            toast("Đã xóa thông báo.");
        }).fail(function() {
            toast('Lỗi! Không thể xóa thông báo.');
        });
    }

    function fmtDate(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        var m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return d.getDate() + ' ' + m[d.getMonth()] + ', ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
</script>
</body>
</html>
