<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4 fw-bold">Tạo Tài Khoản</h2>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success" id="btnSubmit">Đăng ký ngay</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <span class="small text-muted">Đã có tài khoản? <a href="login.html" class="text-primary text-decoration-none">Đăng nhập</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(event) {
        event.preventDefault(); // Chặn reload trang

        // 1. Lấy dữ liệu từ Form (Đã bỏ email)
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const confirmPass = document.getElementById('confirmPassword').value;

        // 2. Validate nhanh Frontend: Kiểm tra mật khẩu khớp nhau
        if (pass !== confirmPass) {
            alert('Mật khẩu xác nhận không khớp. Vui lòng nhập lại!');
            return; // Dừng luôn, không gọi API nữa
        }

        // Hiệu ứng UX: Đổi nút thành Đang xử lý
        const btnSubmit = document.getElementById('btnSubmit');
        btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Đang xử lý...';
        btnSubmit.disabled = true;

        // 3. Gọi API tạo User của Spring Boot (Chỉ gửi username và password)
        fetch('http://localhost:8080/users', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username: user,
                password: pass
            })
        })
            .then(response => response.json().then(data => ({ status: response.status, body: data })))
            .then(({ status, body }) => {
                // Trả lại nút bấm ban đầu
                btnSubmit.innerHTML = 'Đăng ký ngay';
                btnSubmit.disabled = false;

                // 4. Xử lý phản hồi từ Server
                if (status === 200 && body.code === 1000) {
                    alert('Đăng ký tài khoản thành công! Vui lòng đăng nhập.');
                    window.location.href = "login.html";
                } else {
                    alert('Đăng ký thất bại: ' + (body.message || 'Lỗi không xác định'));
                }
            })
            .catch(error => {
                btnSubmit.innerHTML = 'Đăng ký ngay';
                btnSubmit.disabled = false;
                console.error('Lỗi kết nối:', error);
                alert('Không thể kết nối đến Server Backend!');
            });
    });
</script>
</body>
</html>
