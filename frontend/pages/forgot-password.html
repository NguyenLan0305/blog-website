<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light overflow-x-hidden bg-background no-global-search">
    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 text-center">
                        <h2 class="fw-bold mb-3">Quên mật khẩu?</h2>
                        <p class="text-muted small mb-4">Nhập email của bạn, chúng tôi sẽ gửi mã xác nhận để đặt lại mật khẩu.</p>
                        
                        <form>
                            <div class="mb-4 text-start">
                                <label for="email" class="form-label">Email đăng ký</label>
                                <input type="email" class="form-control" id="email" name="email">
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Gửi yêu cầu</button>
                                <a href="login.html" class="btn btn-link text-decoration-none text-muted small">Quay lại đăng nhập</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
