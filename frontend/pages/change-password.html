<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Change Password — Inkwell</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../assets/css/main.css"/>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
        body { background-color: #0b0e14 !important; color: #e0e5f5; font-family: 'Inter', sans-serif; margin: 0; }
        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; }
        #navbar-container { position: fixed; top: 0; width: 100%; z-index: 1050; background: #0b0e14; border-bottom: 1px solid rgba(66,72,85,0.15);}
        .no-underline { text-decoration: none !important; }
    </style>
</head>
<body class="overflow-x-hidden bg-background no-global-search">

<div id="navbar-container"></div>

<div id="dashboard-sidebar-container"></div>

<main class="md:ml-64 px-6 md:px-12 pb-20 min-h-screen" style="padding-top: 100px;">
    <div class="max-w-3xl mx-auto w-full">
        <header class="mb-12 border-b border-[#424855]/20 pb-4">
            <h1 class="font-['Newsreader'] text-4xl md:text-5xl italic font-bold text-[#e0e5f5] tracking-tight mb-2">Change Password</h1>
            <p class="text-[#a5abba] font-['Inter']">Ensure your account is using a long, random password to stay secure.</p>
        </header>

        <div class="bg-[#10131b] p-6 md:p-10 rounded-xl shadow-[0_20px_40px_rgba(0,0,0,0.3)] border border-[#424855]/10">
            <form id="form-change-password" class="space-y-6 max-w-md mx-auto">

                <div class="space-y-2">
                    <label class="block text-[10px] font-['Inter'] font-bold text-[#a5abba] uppercase tracking-[0.1em]">Current Password</label>
                    <input id="input-old-pass" required class="w-full bg-[#000] border border-[#424855]/30 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-[#7C3AED] focus:border-transparent outline-none transition-all text-white" type="password" placeholder="Enter your current password">
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-['Inter'] font-bold text-[#a5abba] uppercase tracking-[0.1em]">New Password</label>
                    <input id="input-new-pass" required minlength="6" class="w-full bg-[#000] border border-[#424855]/30 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-[#7C3AED] focus:border-transparent outline-none transition-all text-white" type="password" placeholder="Create a new password">
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-['Inter'] font-bold text-[#a5abba] uppercase tracking-[0.1em]">Confirm New Password</label>
                    <input id="input-confirm-pass" required minlength="6" class="w-full bg-[#000] border border-[#424855]/30 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-[#7C3AED] focus:border-transparent outline-none transition-all text-white" type="password" placeholder="Type new password again">
                </div>

                <div class="pt-6 border-t border-[#424855]/10 mt-8 text-center">
                    <button id="btn-submit-pass" class="w-full px-10 py-3 bg-gradient-to-r from-[#7C3AED] to-[#ac8aff] text-white font-bold rounded-full text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all border-none" type="submit">
                        Update Password
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<div id="toasts"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/nav.js"></script>

<script>
    $(document).ready(function() {
        $('#navbar-container').load('../fragments/navbar.html', function() {
            if (typeof updateNavAuth === 'function') { updateNavAuth(); }
        });

        // LOAD SIDEBAR
        $('#dashboard-sidebar-container').load('../fragments/dashboard-sidebar.html');

        if (!S.isAuth) { window.location.href = 'login.html'; }
    });

    $('#form-change-password').on('submit', function(e) {
        e.preventDefault();

        const oldPass = $('#input-old-pass').val();
        const newPass = $('#input-new-pass').val();
        const confirmPass = $('#input-confirm-pass').val();

        if (newPass !== confirmPass) {
            alert('Mật khẩu mới và Xác nhận mật khẩu không khớp!');
            return;
        }

        const btn = $('#btn-submit-pass');
        const originalText = btn.html();
        btn.html('Updating...').prop('disabled', true).css('opacity', '0.7');

        const requestBody = {
            oldPassword: oldPass,
            newPassword: newPass,
            confirmPassword: confirmPass
        };

        callApi('/users/my-profile/change-password', 'PUT', requestBody)
            .done(function() {
                toast('Đổi mật khẩu thành công!');
                $('#form-change-password')[0].reset(); // Xóa trắng form
            })
            .fail(function(xhr) {
                let errorMsg = 'Lỗi! Mật khẩu cũ không chính xác.';
                if (xhr.responseJSON && xhr.responseJSON.message) errorMsg = xhr.responseJSON.message;
                alert(errorMsg);
            })
            .always(function() {
                btn.html(originalText).prop('disabled', false).css('opacity', '1');
            });
    });
</script>
</body>
</html>
