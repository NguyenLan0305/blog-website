<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BlogAdmin | Post Moderation</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;700&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "admin-bg": "#F5F5F3",
                        "admin-side": "#2D3432",
                        "admin-primary": "#ac8aff"
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F3; margin: 0; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; }

        /* Layout Structure */
        aside { position: fixed; left: 0; top: 0; height: 100vh; width: 220px; background-color: #2D3432; z-index: 1100; }
        header { position: fixed; top: 0; right: 0; left: 220px; height: 64px; background: white; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 1000; display: flex; align-items: center; padding: 0 32px; justify-content: space-between; }
        main { margin-left: 220px; padding-top: 84px !important; min-height: 100vh; }

        .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: #ADB3B0; text-decoration: none; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(172, 138, 255, 0.08); border-right: 4px solid #ac8aff; }
        .admin-btn-signin { border: 1px solid #7c6ff7; color: #7c6ff7; font-weight: 600; padding: 0.5rem 1.5rem; border-radius: 9999px; font-size: 13px; transition: all 0.2s; text-decoration: none; }

        /* Modal Styles */
        #postModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; }
        #postModal.active { display: flex; }

        /* Custom Select Filter */
        .filter-select {
            appearance: none;
            background-color: white;
            border: 1px solid #e2e8f0;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #4a5568;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        .filter-select:focus { border-color: #ac8aff; ring: 2px; ring-color: rgba(172, 138, 255, 0.1); }
    </style>
</head>
<body>

<aside>
    <div class="p-8 mb-4">
        <h1 class="text-white font-bold text-xl tracking-widest uppercase">BLOG <span class="text-[#ac8aff]">ADMIN</span></h1>
    </div>
    <nav class="flex flex-col">
        <a href="Dashboard.html" class="nav-item"><span class="material-symbols-outlined">dashboard</span><span>DASHBOARD</span></a>
        <a href="Users.html" class="nav-item"><span class="material-symbols-outlined">group</span><span>USERS</span></a>
        <a href="POSTS.html" class="nav-item"><span class="material-symbols-outlined">description</span><span>POSTS</span></a>
        <a href="CATEGORIES%20&%20TAGS.html" class="nav-item"><span class="material-symbols-outlined">group</span><span>CATEGORIES & TAGS</span></a>
    </nav>
</aside>

<header>
    <h2 class="text-lg font-bold text-[#2D3432] uppercase tracking-tight">Post Moderation</h2>
    <div class="flex items-center gap-6">
        <button class="relative text-slate-400 hover:text-[#ac8aff]"><span class="material-symbols-outlined">notifications</span></button>
        <div class="h-6 w-[1px] bg-slate-200"></div>
        <a href="admin-login.html" class="admin-btn-signin">Sign In</a>
    </div>
</header>

<main class="p-8">
    <div class="flex flex-wrap items-center justify-between mb-8 bg-white/50 p-4 rounded-lg border border-slate-100 shadow-sm gap-4">

        <div class="flex items-center gap-3">
            <div class="relative">
                <select class="filter-select">
                    <option>All Posts</option>
                    <option>Pending</option>
                    <option>Approved</option>
                    <option>Hidden</option>
                </select>
                <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
            </div>

            <div class="relative w-64">
                <span class="absolute inset-y-0 left-3 flex items-center text-slate-400">
                    <span class="material-symbols-outlined text-[20px]">search</span>
                </span>
                <input class="w-full bg-white border border-slate-200 rounded-lg pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#ac8aff]/20 transition-all" placeholder="Search titles..." type="text"/>
            </div>
        </div>

        <button onclick="togglePostModal(true)" class="bg-[#2D3432] text-white px-6 py-3 rounded-lg font-bold text-sm flex items-center gap-2 hover:bg-black transition-all shadow-lg uppercase">
            <span class="material-symbols-outlined text-[20px]">add_box</span>
            New Post
        </button>
    </div>

    <div class="bg-white shadow-sm border border-slate-100 overflow-hidden rounded-sm">
        <table class="w-full text-left text-sm">
            <thead>
            <tr class="text-[10px] text-slate-400 uppercase border-b border-slate-50 font-bold bg-slate-50/50">
                <th class="p-6">Post Title</th>
                <th class="p-6">Author</th>
                <th class="p-6">Category</th>
                <th class="p-6 text-right">Actions</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-50 text-slate-600">
            <tr class="hover:bg-slate-50 transition-colors">
                <td class="p-6 font-medium text-slate-800">The Architecture of Silence</td>
                <td class="p-6">Elena Vance</td>
                <td class="p-6"><span class="px-2 py-0.5 bg-slate-100 text-slate-500 text-[10px] font-bold rounded uppercase">Design</span></td>
                <td class="p-6 text-right text-slate-300">
                    <button class="hover:text-[#ac8aff] mr-3"><span class="material-symbols-outlined text-lg">visibility</span></button>
                    <button class="hover:text-red-400"><span class="material-symbols-outlined text-lg">delete</span></button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div id="postModal" onclick="if(event.target == this) togglePostModal(false)">
    <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden transform transition-all scale-95 opacity-0 duration-200" id="modalContent">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <h3 class="font-bold text-lg text-[#2D3432] uppercase tracking-tight">Create New Post</h3>
            <button onclick="togglePostModal(false)" class="text-slate-400 hover:text-slate-600 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <form class="p-8 space-y-6" onsubmit="event.preventDefault(); togglePostModal(false);">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Post Title</label>
                <input type="text" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#ac8aff]/20 outline-none transition-all" placeholder="Enter article title...">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Author Name</label>
                <input type="text" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#ac8aff]/20 outline-none transition-all" placeholder="Elena Vance">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Select Category</label>
                <select id="catSelect" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#ac8aff]/20 outline-none bg-white appearance-none cursor-pointer" onchange="checkOther(this.value)">
                    <option value="design">Design</option>
                    <option value="technology">Technology</option>
                    <option value="society">Society</option>
                    <option value="other">Other (Type below...)</option>
                </select>
            </div>

            <div id="otherCatDiv" class="space-y-2 hidden">
                <label class="text-[10px] font-bold text-[#ac8aff] uppercase tracking-widest">Specify Other Category</label>
                <input type="text" class="w-full border border-[#ac8aff]/30 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#ac8aff]/20 outline-none transition-all" placeholder="Enter new category name">
            </div>

            <div class="pt-4 flex gap-3">
                <button type="button" onclick="togglePostModal(false)" class="flex-1 py-3 text-sm font-bold text-slate-400 uppercase tracking-widest">Cancel</button>
                <button type="submit" class="flex-1 py-3 bg-[#ac8aff] text-white rounded-xl text-sm font-bold hover:brightness-105 shadow-lg shadow-[#ac8aff]/20 transition-all uppercase tracking-widest">Publish</button>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePostModal(show) {
        const modal = document.getElementById('postModal');
        const content = document.getElementById('modalContent');
        if (show) {
            modal.classList.add('active');
            setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10);
        } else {
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.remove('active'); }, 200);
        }
    }

    function checkOther(val) {
        const otherDiv = document.getElementById('otherCatDiv');
        if(val === 'other') otherDiv.classList.remove('hidden');
        else otherDiv.classList.add('hidden');
    }
</script>

</body>
</html>
