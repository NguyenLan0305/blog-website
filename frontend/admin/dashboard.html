<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BlogAdmin Dashboard — Inkwell</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;700&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "admin-bg": "#F5F5F3",
                        "admin-side": "#2D3432",
                        "admin-primary": "#ac8aff",
                        "bd-p": "#7c6ff7"
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F3; margin: 0; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; }

        /* Sidebar Admin */
        aside {
            position: fixed; left: 0; top: 0; height: 100vh; width: 220px;
            background-color: #2D3432; z-index: 1000;
        }

        /* Navbar Admin */
        header {
            position: fixed; top: 0; right: 0; left: 220px; height: 64px;
            background: white; border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 999; display: flex; align-items: center; padding: 0 32px;
            justify-content: space-between;
        }

        main { margin-left: 220px; padding-top: 64px; }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 14px 20px;
            color: #ADB3B0; text-decoration: none; font-size: 12px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active {
            color: white; background: rgba(172, 138, 255, 0.08);
            border-right: 4px solid #ac8aff;
        }

        .admin-btn-signin {
            border: 1px solid #7c6ff7;
            color: #7c6ff7;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            font-size: 13px;
            transition: all 0.2s;
            text-decoration: none;
        }
        .admin-btn-signin:hover {
            background: #7c6ff7;
            color: white;
            box-shadow: 0 4px 12px rgba(124, 111, 247, 0.2);
        }
    </style>
</head>
<body>

<div id="sidebar-placeholder"></div>

<header>
    <div>
        <h2 class="text-lg font-bold text-[#2D3432] tracking-tight uppercase">Dashboard</h2>
    </div>

    <div class="flex items-center gap-6">
        <button class="relative text-slate-400 hover:text-[#ac8aff] transition-colors">
            <span class="material-symbols-outlined">notifications</span>
            <span class="absolute -top-0.5 -right-0.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
    </div>
</header>

<main class="p-8">
    <div class="mb-10">
        <h3 class="text-xl font-medium text-slate-400">System Overview</h3>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    $(document).ready(function() {
        // Hãy kiểm tra đường dẫn file admin_sidebar.html cho đúng (ví dụ: "../fragments/admin_sidebar.html")
        $("#sidebar-placeholder").load("../fragments/admin_sidebar.html", function() {
            // Sau khi load xong, tìm đúng link Dashboard để active
            $("#nav-dashboard").addClass("active");
        });
    });
</script>

</body>
</html>
