server:
  port: 8080
spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/blogdb"
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  application:
    name: blog-website
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    web:
      resources:
        static-locations: classpath:/static/
