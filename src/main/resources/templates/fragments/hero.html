<th:block th:fragment="hero">
    <section id="hero">
        <div class="container-xl">
            <div class="row align-items-center">
                <div class="col-lg-7">
                    <div class="eyebrow"><span class="eyebrow-dot"></span>Publishing Platform</div>

                    <p class="hero-sub">A curated space for thoughtful writing on technology, design, science, and the
                        things that make us human.</p>
                    <div class="hero-stats">
                        <div>
                            <div class="sv" id="stat-p">—</div>
                            <div class="sl">Articles</div>
                        </div>
                        <div>
                            <div class="sv" id="stat-c">—</div>
                            <div class="sl">Categories</div>
                        </div>
                        <div>
                            <div class="sv" id="stat-t">—</div>
                            <div class="sl">Tags</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-5 d-none d-lg-flex justify-content-end">
                    <div class="deco-wrap">
                        <div class="dc" style="top:0;left:0;width:75px;height:60px;"></div>
                        <div class="dc" style="top:0;left:90px;width:75px;height:60px;"></div>

                        <div class="dc" style="top:150px;left:180px;width:75px;height:60px;"></div>
                        <div class="deco-card">
                            <div class="dl" style="width:60%;height:10px;"></div>
                            <div class="dl" style="width:80%;height:8px;"></div>
                            <div class="dl" style="width:68%;height:8px;"></div>
                            <div class="dl" style="width:50%;height:8px;"></div>
                            <div class="dt">
                                <div style="width:52px;height:20px;background:rgba(124,111,247,.3);border-radius:6px;"></div>
                                <div style="width:38px;height:20px;background:rgba(62,207,176,.2);border-radius:6px;"></div>
                            </div>

                </div>
            </div>
