<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bleb — Blog Platform</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet"/>
    <!-- App styles -->
    <link rel="stylesheet" type="text/css" th:href="@{/assets/css/main.css}"/>
</head>
<body>

<!-- ══════════════════════════════════
     NAVBAR  (fragment: templates/fragments/navbar.html)
══════════════════════════════════ -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ══════════════════════════════════
     PAGES
══════════════════════════════════ -->

<!-- HOME -->
<div id="p-home">

    <!-- Hero  (fragment: templates/fragments/hero.html) -->
    <div th:replace="~{fragments/hero :: hero}"></div>

    <!-- Content -->
    <div id="main-body">
        <div class="container-xl">
            <div class="row g-4">

                <!-- Posts -->
                <div class="col-lg-8">
                    <div class="filter-panel">
                        <div class="flbl">Filter by Category</div>
                        <div class="cat-tabs" id="cat-tabs"></div>
                        <div class="fsep"></div>
                        <div class="flbl">Filter by Tag</div>
                        <div class="tag-chips" id="tag-chips"></div>
                    </div>

                    <div class="toolbar">
                        <p class="pcount" id="pcount"></p>
                        <div class="d-flex align-items-center gap-2">
                            <label for="sort-sel"
                                   style="font-size:.79rem;color:var(--t3);white-space:nowrap;">Sort:</label>
                            <select class="sort-sel" id="sort-sel">
                                <option value="createdAt,desc">Newest First</option>
                                <option value="createdAt,asc">Oldest First</option>
                                <option value="title,asc">Title A–Z</option>
                                <option value="title,desc">Title Z–A</option>
                                <option value="readingTime,asc">Quickest Read</option>
                            </select>
                        </div>
                    </div>

                    <div id="post-list"></div>
                </div>

                <!-- Sidebar -->
                <div class="col-lg-4">
                    <div class="sw">
                        <div class="sw-ttl">Trending Now</div>
                        <div id="sb-trending"></div>
                    </div>
                    <div class="sw">
                        <div class="sw-ttl">Explore Tags</div>
                        <div id="sb-tags"></div>
                    </div>
                    <div class="sw sw-nl">
                        <div class="sw-ttl">Newsletter</div>
                        <p class="nl-txt">Get the best articles delivered to your inbox, weekly.</p>
                        <input class="nl-in" id="nl-email" type="email" placeholder="your@email.com"/>
                        <button class="nl-btn" id="nl-sub">Subscribe</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div><!-- /#p-home -->


<!-- CATEGORIES -->
<div id="p-categories" style="display:none;">
    <div class="container-xl">
        <div class="ph">
            <div class="ph-g">◈</div>
            <h2 class="ph-h">Categories</h2>
            <p class="ph-s">Browse all categories and discover great reads.</p>
            <div class="row g-3 mt-4" id="cat-grid" style="text-align:left;"></div>
            <button class="ph-back" data-page="home">← Back to Home</button>
        </div>
    </div>
</div>

<!-- TAGS -->
<div id="p-tags" style="display:none;">
    <div class="container-xl">
        <div class="ph">
            <div class="ph-g">◈</div>
            <h2 class="ph-h">Tags</h2>
            <p class="ph-s">Explore all topics and find what interests you.</p>
            <div class="mt-4" id="tags-grid"></div>
            <button class="ph-back" data-page="home">← Back to Home</button>
        </div>
    </div>
</div>


<!-- ══════════════════════════════════
     FOOTER  (fragment: templates/fragments/footer.html)
══════════════════════════════════ -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Toast container -->
<div id="toasts"></div>


<!-- ══════════════════════════════════
     SCRIPTS — load order matters
══════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script th:src="@{/assets/js/data.js}"></script>
<script th:src="@{/assets/js/app.js}"></script>
<script th:src="@{/assets/js/posts.js}"></script>
<script th:src="@{/assets/js/sidebar.js}"></script>
<script th:src="@{/assets/js/filters.js}"></script>
<script th:src="@{/assets/js/pages.js}"></script>
<script th:src="@{/assets/js/auth.js}"></script>
<script th:src="@{/assets/js/nav.js}"></script>
<script th:src="@{/assets/js/init.js}"></script>

</body>
</html>
